<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHATGRAM - Random Chat</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* =====================================================
RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family: Arial, sans-serif;
background:#eef4ff;
height:100vh;
display:flex;
flex-direction:column;
}

/* =====================================================
TOP BAR
===================================================== */

.top-bar{
background:#2b6cb0;
padding:15px;
display:flex;
justify-content:flex-start;
align-items:center;
gap:10px;
color:white;
border-bottom:2px solid #1e4e8c;
}

.top-bar h1{
font-size:28px;
font-weight:bold;
margin-right:auto;
}

.top-bar input{
padding:10px;
border-radius:6px;
border:none;
width:180px;
}

.top-bar button{
padding:10px 20px;
background:#38a169;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
}

.top-bar button:hover{
background:#2f855a;
}

/* =====================================================
MAIN CONTAINER (30% LEFT + 70% RIGHT)
===================================================== */

.main-container{
display:flex;
flex:1;
}

/* =====================================================
LEFT SIDEBAR - ONLINE USERS (30%)
===================================================== */

.left-sidebar{
width:30%;
background:white;
border-right:2px solid #ddd;
display:flex;
flex-direction:column;
overflow:hidden;
}

.sidebar-header{
background:#e8f4ff;
padding:15px;
border-bottom:2px solid #2b6cb0;
text-align:center;
color:#2b6cb0;
font-weight:bold;
font-size:16px;
}

.online-users{
flex:1;
overflow-y:auto;
padding:10px;
}

.user-item{
padding:12px;
margin:8px 0;
background:#f0f7ff;
border-left:4px solid #38a169;
border-radius:6px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.3s;
}

.user-item:hover{
background:#e1f0ff;
transform:translateX(5px);
}

.user-avatar{
width:40px;
height:40px;
border-radius:50%;
background:#2b6cb0;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.user-info{
flex:1;
}

.user-name{
font-weight:bold;
color:#333;
font-size:14px;
}

.user-status{
font-size:12px;
color:#888;
}

.status-dot{
width:8px;
height:8px;
border-radius:50%;
background:#38a169;
display:inline-block;
}

/* =====================================================
RIGHT CHAT AREA (70%)
===================================================== */

.right-chat{
width:70%;
display:flex;
flex-direction:column;
background:white;
overflow:hidden;
}

.chat-container{
display:flex;
flex-direction:column;
flex:1;
background:white;
overflow:hidden;
}

.chat{
flex:1;
overflow-y:auto;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
margin:6px 0;
font-size:14px;
display:flex;
animation:fadeIn 0.3s ease;
}

.you{
justify-content:flex-end;
}

.you .msg-bubble{
background:#bee3f8;
color:#2b6cb0;
}

.stranger{
justify-content:flex-start;
}

.stranger .msg-bubble{
background:#edf2f7;
color:#333;
}

.system{
justify-content:center;
}

.system .msg-bubble{
background:#f0f0f0;
color:#888;
font-size:12px;
text-align:center;
}

.msg-bubble{
display:inline-block;
padding:10px 14px;
border-radius:12px;
max-width:60%;
word-wrap:break-word;
}

/* =====================================================
INPUT
===================================================== */

.input-area{
display:flex;
border-top:2px solid #ddd;
}

.input-area input{
flex:1;
padding:12px;
border:none;
outline:none;
font-size:14px;
}

.input-area button{
padding:12px 25px;
background:#2b6cb0;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.3s;
}

.input-area button:hover{
background:#1e4e8c;
}

.input-area button:active{
transform:scale(0.95);
}

/* =====================================================
BOTTOM BUTTONS
===================================================== */

.bottom{
display:flex;
border-top:2px solid #ddd;
}

.bottom button{
flex:1;
padding:14px;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.bottom button:active{
transform:scale(0.95);
}

.new{
background:#3182ce;
}

.new:hover{
background:#2b5aa0;
}

.photo{
background:#2c7a7b;
}

.photo:hover{
background:#235f60;
}

.report{
background:#e53e3e;
}

.report:hover{
background:#c53030;
}

/* =====================================================
SCROLLBAR
===================================================== */

.chat::-webkit-scrollbar,
.online-users::-webkit-scrollbar{
width:6px;
}

.chat::-webkit-scrollbar-thumb,
.online-users::-webkit-scrollbar-thumb{
background:#90cdf4;
border-radius:3px;
}

/* =====================================================
ANIMATION
===================================================== */

@keyframes fadeIn{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

/* =====================================================
RESPONSIVE (MOBILE)
===================================================== */

@media(max-width:1024px){
.main-container{
flex-direction:column;
}

.left-sidebar{
width:100%;
height:150px;
border-right:none;
border-bottom:2px solid #ddd;
}

.right-chat{
width:100%;
flex:1;
}

.online-users{
flex-direction:row;
overflow-x:auto;
}

.user-item{
flex-shrink:0;
min-width:120px;
}
}

@media(max-width:600px){
.top-bar{
flex-direction:column;
gap:10px;
}

.top-bar h1{
font-size:20px;
margin-right:0;
}

.top-bar input{
width:100%;
}

.top-bar button{
width:100%;
}
}

</style>

</head>

<body>

<!-- =====================================================
TOP BAR
===================================================== -->

<div class="top-bar">
<h1>CHATGRAM</h1>
<span>Name:</span>
<input type="text" id="name" value="Stranger">
<button onclick="startChat()">START CHAT</button>
</div>

<!-- =====================================================
MAIN CONTAINER (30% + 70%)
===================================================== -->

<div class="main-container">

<!-- LEFT SIDEBAR - ONLINE USERS (30%) -->

<div class="left-sidebar">
<div class="sidebar-header">
<span class="status-dot"></span> Online Users
</div>
<div class="online-users" id="online-users">
<!-- Online users will be populated here -->
</div>
</div>

<!-- RIGHT CHAT AREA (70%) -->

<div class="right-chat">

<div class="chat-container">
<div class="chat" id="chat"></div>

<div class="input-area">
<input type="text" id="msg" placeholder="Type Message Here">
<button onclick="sendMsg()">SEND</button>
</div>
</div>

<!-- BOTTOM BUTTONS -->

<div class="bottom">
<button class="new" onclick="next()">New Chat</button>
<button class="photo">Req Photo</button>
<button class="report">Report</button>
</div>

</div>

</div>

<!-- =====================================================
JS
===================================================== -->

<script>

const socket = io();

let started = false;
const onlineUsers = [];

// START CHAT
function startChat(){
if(started) return;

started = true;
addMsg("Connecting to stranger...", "system");

socket.emit("start");
}

// ADD MESSAGE
function addMsg(text, type){
const chat = document.getElementById("chat");

const div = document.createElement("div");
div.className = "msg " + type;

const bubble = document.createElement("div");
bubble.className = "msg-bubble";
bubble.innerText = text;

div.appendChild(bubble);
chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;
}

// SEND MESSAGE
function sendMsg(){
const input = document.getElementById("msg");
const text = input.value.trim();

if(text === "") return;

addMsg(text, "you");
socket.emit("message", text);

input.value = "";
}

// NEXT CHAT
function next(){
addMsg("Finding new stranger...", "system");
socket.emit("next");
}

// ENTER KEY
document.getElementById("msg").addEventListener("keypress", (e)=>{
if(e.key === "Enter") sendMsg();
});

// SOCKET EVENTS

socket.on("matched", ()=>{
addMsg("Connected with stranger", "system");
});

socket.on("message", (msg)=>{
addMsg(msg, "stranger");
});

socket.on("stranger-disconnected", ()=>{
addMsg("Stranger disconnected", "system");
});

// ONLINE USERS
socket.on("update-users", (users)=>{
updateOnlineUsers(users);
});

function updateOnlineUsers(users){
const container = document.getElementById("online-users");
container.innerHTML = "";

users.forEach(user => {
const userDiv = document.createElement("div");
userDiv.className = "user-item";

const avatar = document.createElement("div");
avatar.className = "user-avatar";
avatar.innerText = user.name.charAt(0).toUpperCase();

const info = document.createElement("div");
info.className = "user-info";

const name = document.createElement("div");
name.className = "user-name";
name.innerText = user.name;

const status = document.createElement("div");
status.className = "user-status";
status.innerHTML = '<span class="status-dot"></span> Online';

info.appendChild(name);
info.appendChild(status);

userDiv.appendChild(avatar);
userDiv.appendChild(info);

container.appendChild(userDiv);
});
}

</script>

</body>
</html>
