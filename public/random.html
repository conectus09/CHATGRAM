<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHATGRAM Random Chat</title>

<link rel="icon" href="favicon.ico">

<script src="/socket.io/socket.io.js"></script>

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: "Segoe UI", sans-serif;
}

/* BODY */

body{

height:100vh;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;

display:flex;
justify-content:center;
align-items:center;

overflow:hidden;

}

/* CHAT CONTAINER */

.chat-container{

width:95%;
max-width:1100px;
height:92vh;

background:rgba(255,255,255,0.05);

border-radius:20px;

backdrop-filter:blur(20px);

display:flex;
flex-direction:column;

box-shadow:0 0 40px rgba(0,0,0,0.6);

overflow:hidden;

}

/* HEADER */

.header{

height:70px;

padding:20px;

display:flex;

justify-content:space-between;

align-items:center;

border-bottom:1px solid rgba(255,255,255,0.08);

background:rgba(255,255,255,0.03);

}

/* LOGO */

.logo{

font-size:20px;
font-weight:bold;

color:#00e5ff;

}

/* STATUS */

.status{

font-size:14px;

color:#aaa;

}

/* ONLINE USERS */

.online{

font-size:14px;

}

/* CHAT BOX */

.chat-box{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;

flex-direction:column;

gap:10px;

}

/* MESSAGE */

.message{

padding:12px 14px;

border-radius:10px;

max-width:65%;

font-size:14px;

word-wrap:break-word;

}

/* YOU MESSAGE */

.you{

align-self:flex-end;

background:linear-gradient(45deg,#00bfff,#00ffff);

color:black;

}

/* STRANGER MESSAGE */

.stranger{

align-self:flex-start;

background:rgba(255,255,255,0.1);

}

/* SYSTEM MESSAGE */

.system{

align-self:center;

background:rgba(255,255,255,0.08);

font-size:13px;

color:#aaa;

}

/* TYPING INDICATOR */

.typing{

height:25px;

font-size:13px;

color:#aaa;

padding-left:20px;

display:none;

}

/* INPUT AREA */

.input-area{

display:flex;

padding:15px;

gap:10px;

border-top:1px solid rgba(255,255,255,0.08);

}

/* INPUT */

.input-area input{

flex:1;

padding:12px;

border:none;

border-radius:10px;

background:rgba(255,255,255,0.08);

color:white;

outline:none;

}

/* BUTTON */

button{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:bold;

}

/* SEND BUTTON */

.send{

background:#00ffff;

color:black;

}

/* NEXT BUTTON */

.next{

background:#ff3b3b;

color:white;

}

/* SCROLLBAR */

.chat-box::-webkit-scrollbar{
width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#00ffff;
border-radius:10px;
}

</style>

</head>

<body>

<div class="chat-container">

<!-- HEADER -->

<div class="header">

<div class="logo">CHATGRAM</div>

<div class="status" id="status">Connecting...</div>

<div class="online">👥 <span id="online">0</span></div>

</div>


<!-- CHAT AREA -->

<div class="chat-box" id="chatBox">

<div class="message system">Connecting to random stranger...</div>

</div>


<div class="typing" id="typing">

Stranger is typing...

</div>


<!-- INPUT -->

<div class="input-area">

<input type="text" id="messageInput" placeholder="Type a message...">

<button class="send" id="sendBtn">Send</button>

<button class="next" id="nextBtn">Next</button>

</div>

</div>

<script>

const socket = io();

const chatBox = document.getElementById("chatBox");

const messageInput = document.getElementById("messageInput");

const sendBtn = document.getElementById("sendBtn");

const nextBtn = document.getElementById("nextBtn");

const status = document.getElementById("status");

const typing = document.getElementById("typing");

const online = document.getElementById("online");

let typingTimeout;

/* ADD MESSAGE FUNCTION */

function addMessage(text,type){

const msg = document.createElement("div");

msg.classList.add("message");

msg.classList.add(type);

msg.innerText = text;

chatBox.appendChild(msg);

chatBox.scrollTop = chatBox.scrollHeight;

}

/* SOCKET EVENTS */

socket.on("connect",()=>{

status.innerText="Searching for stranger...";

});

socket.on("waiting",()=>{

status.innerText="Waiting for stranger...";

addMessage("Waiting for stranger...","system");

});

socket.on("matched",()=>{

status.innerText="Connected with stranger";

addMessage("You are now chatting with a stranger","system");

});

socket.on("message",(msg)=>{

typing.style.display="none";

addMessage("Stranger: "+msg,"stranger");

});

socket.on("typing",()=>{

typing.style.display="block";

});

socket.on("stop-typing",()=>{

typing.style.display="none";

});

socket.on("stranger-disconnected",()=>{

status.innerText="Stranger disconnected";

addMessage("Stranger disconnected","system");

});

socket.on("online-users",(count)=>{

online.innerText=count;

});

/* SEND MESSAGE */

sendBtn.onclick=sendMessage;

function sendMessage(){

const msg=messageInput.value.trim();

if(msg==="")return;

addMessage("You: "+msg,"you");

socket.emit("message",msg);

messageInput.value="";

socket.emit("stop-typing");

}

/* ENTER KEY */

messageInput.addEventListener("keypress",(e)=>{

if(e.key==="Enter")sendMessage();

});

/* TYPING */

messageInput.addEventListener("input",()=>{

socket.emit("typing");

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{

socket.emit("stop-typing");

},1000);

});

/* NEXT STRANGER */

nextBtn.onclick=()=>{

chatBox.innerHTML="";

addMessage("Searching for new stranger...","system");

status.innerText="Searching...";

socket.emit("next");

};

</script>

</body>
</html>
