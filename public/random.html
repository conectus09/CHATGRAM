<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHATGRAM Random Chat</title>

<link rel="icon" href="favicon.ico">

<script src="/socket.io/socket.io.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

/* =====================================================
GLOBAL RESET
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

/* =====================================================
BODY
===================================================== */

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#020617,#0f172a,#1e293b);

color:white;

overflow:hidden;

}

/* =====================================================
ANIMATED BACKGROUND PARTICLES
===================================================== */

body::before{

content:"";

position:absolute;

width:100%;
height:100%;

background-image:
radial-gradient(circle at 20% 20%,#38bdf8 1px,transparent 1px),
radial-gradient(circle at 80% 70%,#06b6d4 1px,transparent 1px);

background-size:200px 200px;

opacity:.15;

animation:moveBg 40s linear infinite;

}

@keyframes moveBg{

0%{transform:translate(0,0);}
100%{transform:translate(-200px,-200px);}

}

/* =====================================================
CHAT CONTAINER
===================================================== */

.chat-container{

position:relative;

width:95%;
max-width:1100px;

height:92vh;

display:flex;
flex-direction:column;

background:rgba(255,255,255,0.05);

border-radius:20px;

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:0 0 40px rgba(0,0,0,0.6);

overflow:hidden;

}

/* =====================================================
HEADER
===================================================== */

.header{

height:70px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 25px;

background:rgba(255,255,255,0.03);

border-bottom:1px solid rgba(255,255,255,0.08);

}

.logo{

font-size:20px;
font-weight:600;

color:#00e5ff;

letter-spacing:1px;

}

.status{

font-size:14px;
color:#aaa;

}

.online{

font-size:14px;

}

/* =====================================================
CHAT AREA
===================================================== */

.chat-box{

flex:1;

overflow-y:auto;

padding:20px;

display:flex;
flex-direction:column;

gap:12px;

}

/* MESSAGE */

.message{

padding:12px 14px;

border-radius:12px;

max-width:65%;

font-size:14px;

line-height:1.5;

animation:fadeIn .25s ease;

}

/* YOU */

.you{

align-self:flex-end;

background:linear-gradient(45deg,#00bfff,#00ffff);

color:black;

}

/* STRANGER */

.stranger{

align-self:flex-start;

background:rgba(255,255,255,0.1);

}

/* SYSTEM */

.system{

align-self:center;

background:rgba(255,255,255,0.08);

color:#aaa;

font-size:13px;

}

/* =====================================================
ANIMATION
===================================================== */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(6px);
}

to{
opacity:1;
transform:translateY(0);
}

}

/* =====================================================
TYPING
===================================================== */

.typing{

height:25px;

font-size:13px;

color:#aaa;

padding-left:20px;

display:none;

}

/* =====================================================
INPUT AREA
===================================================== */

.input-area{

display:flex;

gap:10px;

padding:15px;

border-top:1px solid rgba(255,255,255,0.08);

background:rgba(255,255,255,0.03);

}

/* INPUT */

.input-area input{

flex:1;

padding:12px;

border:none;

border-radius:10px;

background:rgba(255,255,255,0.08);

color:white;

outline:none;

}

/* BUTTON */

button{

padding:10px 18px;

border:none;

border-radius:10px;

cursor:pointer;

font-weight:500;

transition:.2s;

}

/* SEND */

.send{

background:#00ffff;

color:black;

}

/* NEXT */

.next{

background:#ff3b3b;

color:white;

}

button:hover{

transform:translateY(-2px);

}

/* =====================================================
SCROLLBAR
===================================================== */

.chat-box::-webkit-scrollbar{
width:6px;
}

.chat-box::-webkit-scrollbar-thumb{
background:#00ffff;
border-radius:10px;
}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:700px){

.chat-container{
height:100vh;
border-radius:0;
}

.logo{
font-size:18px;
}

}

</style>

</head>

<body>

<div class="chat-container">

<!-- HEADER -->

<div class="header">

<div class="logo">CHATGRAM</div>

<div class="status" id="status">Connecting...</div>

<div class="online">👥 <span id="online">0</span></div>

</div>

<!-- CHAT -->

<div class="chat-box" id="chatBox">

<div class="message system">
Connecting to random stranger...
</div>

</div>

<div class="typing" id="typing">
Stranger is typing...
</div>

<!-- INPUT -->

<div class="input-area">

<input
type="text"
id="messageInput"
placeholder="Type a message..."
autocomplete="off"
/>

<button class="send" id="sendBtn">Send</button>

<button class="next" id="nextBtn">Next</button>

</div>

</div>

<script>

/* =====================================================
SOCKET
===================================================== */

const socket = io();

/* ELEMENTS */

const chatBox=document.getElementById("chatBox");
const messageInput=document.getElementById("messageInput");
const sendBtn=document.getElementById("sendBtn");
const nextBtn=document.getElementById("nextBtn");
const status=document.getElementById("status");
const typing=document.getElementById("typing");
const online=document.getElementById("online");

let typingTimeout;

/* =====================================================
MESSAGE FUNCTION
===================================================== */

function addMessage(text,type){

const msg=document.createElement("div");

msg.classList.add("message");
msg.classList.add(type);

msg.innerText=text;

chatBox.appendChild(msg);

chatBox.scrollTop=chatBox.scrollHeight;

}

/* =====================================================
SOCKET EVENTS
===================================================== */

socket.on("connect",()=>{

status.innerText="Searching for stranger...";

});

socket.on("waiting",()=>{

status.innerText="Waiting for stranger...";

addMessage("Waiting for stranger...","system");

});

socket.on("matched",()=>{

status.innerText="Connected with stranger";

addMessage("You are now chatting with a stranger","system");

});

/* MESSAGE */

socket.on("message",(msg)=>{

typing.style.display="none";

addMessage("Stranger: "+msg,"stranger");

});

/* TYPING */

socket.on("typing",()=>{

typing.style.display="block";

});

socket.on("stop-typing",()=>{

typing.style.display="none";

});

/* DISCONNECT */

socket.on("stranger-disconnected",()=>{

status.innerText="Stranger disconnected";

addMessage("Stranger disconnected","system");

});

/* ONLINE USERS */

socket.on("online-users",(count)=>{

online.innerText=count;

});

/* =====================================================
SEND MESSAGE
===================================================== */

sendBtn.onclick=sendMessage;

function sendMessage(){

const msg=messageInput.value.trim();

if(msg==="")return;

addMessage("You: "+msg,"you");

socket.emit("message",msg);

messageInput.value="";

socket.emit("stop-typing");

}

/* ENTER KEY */

messageInput.addEventListener("keypress",(e)=>{

if(e.key==="Enter")sendMessage();

});

/* TYPING */

messageInput.addEventListener("input",()=>{

socket.emit("typing");

clearTimeout(typingTimeout);

typingTimeout=setTimeout(()=>{

socket.emit("stop-typing");

},1000);

});

/* NEXT STRANGER */

nextBtn.onclick=()=>{

chatBox.innerHTML="";

addMessage("Searching for new stranger...","system");

status.innerText="Searching...";

socket.emit("next");

};

</script>

</body>
</html>
