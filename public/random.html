INPUT AREA

BOTTOM ACTIONS

<body>

<!-- ================= START SCREEN ================= -->

<div id="startScreen">
<div class="start-card">
<h1>Random Chat</h1>
<p>Talk with strangers instantly</p>
<input type="text" id="name" placeholder="Enter your name">
<button onclick="showAge()">Start Chat</button>
</div>
</div>

<!-- ================= AGE MODAL ================= -->

<div id="ageModal">
<div class="modal-box">
<h2>18+ Only</h2>
<p>You must be 18 or older</p>
<button onclick="enterChat()">I Agree</button>
</div>
</div>

<!-- ================= MAIN CHAT ================= -->

<div class="container" id="chatUI">

<div class="header">
<div class="header-left">
<span class="partner-name" id="partner">Stranger</span>
<span class="status" id="status">Waiting...</span>
</div>

<div class="chat" id="chat"></div>

<!-- ================= SCRIPT PART 1 ================= -->

<script>

/* =========================================================
UI CONTROL LOGIC
========================================================= */

function showAge(){
document.getElementById("ageModal").style.display="flex";
}

function enterChat(){

document.getElementById("ageModal").style.display="none";
document.getElementById("startScreen").style.display="none";
document.getElementById("chatUI").style.display="flex";

}

/* =========================================================
MESSAGE RENDER SYSTEM
========================================================= */

function addMessage(text,type){

const chat = document.getElementById("chat");

const msg = document.createElement("div");

if(type === "system"){
msg.className = "system";
msg.innerText = text;
}else{
msg.className = "msg " + type;
msg.innerHTML = `<div class="bubble">${text}</div>`;
}

chat.appendChild(msg);

chat.scrollTop = chat.scrollHeight;

}

/* =========================================================
INPUT EVENTS
========================================================= */

document.getElementById("msg").addEventListener("keypress",function(e){

if(e.key === "Enter"){
sendMsg();
}

});

/* =========================================================
DUMMY FUNCTIONS (PART 2 ME CONNECT HONGE)
========================================================= */

function sendMsg(){
addMessage("Message sending...","system");
}

function nextUser(){
addMessage("Finding new stranger...","system");
}

</script>
<!-- ================= SCRIPT PART 2 ================= -->

<script>

/* =========================================================
SOCKET INITIALIZATION
========================================================= */

const socket = io({
    transports: ["websocket"],
    reconnection: true,
    reconnectionAttempts: 5,
    reconnectionDelay: 1000
});

/* =========================================================
STATE MANAGEMENT
========================================================= */

let isConnected = false;
let isSearching = false;
let myName = "";
let partnerName = "Stranger";
let typingTimeout = null;
let isTyping = false;

/* =========================================================
START CHAT CONNECTION
========================================================= */

function enterChat(){

    document.getElementById("ageModal").style.display="none";
    document.getElementById("startScreen").style.display="none";
    document.getElementById("chatUI").style.display="flex";

    myName = document.getElementById("name").value.trim() || "Stranger";

    startMatching();
}

/* =========================================================
MATCHING SYSTEM
========================================================= */

function startMatching(){

    isSearching = true;
    isConnected = false;

    document.getElementById("status").innerText = "Searching...";
    document.getElementById("partner").innerText = "Stranger";

    addMessage("Connecting to server...","system");

    socket.emit("start", {
        name: myName
    });

}

/* =========================================================
NEXT USER SYSTEM
========================================================= */

function nextUser(){

    if(isSearching) return;

    isConnected = false;
    isSearching = true;

    addMessage("Skipping to next stranger...","system");

    document.getElementById("chat").innerHTML = "";

    socket.emit("next");

    document.getElementById("status").innerText = "Searching...";
}

/* =========================================================
SEND MESSAGE
========================================================= */

function sendMsg(){

    const input = document.getElementById("msg");
    const text = input.value.trim();

    if(!text || !isConnected) return;

    addMessage(text,"you");

    socket.emit("message", {
        text: text,
        time: Date.now()
    });

    input.value = "";

    stopTyping();
}

/* =========================================================
TYPING SYSTEM (CLIENT SIDE)
========================================================= */

document.getElementById("msg").addEventListener("input", function(){

    if(!isConnected) return;

    if(!isTyping){
        isTyping = true;
        socket.emit("typing");
    }

    clearTimeout(typingTimeout);

    typingTimeout = setTimeout(()=>{
        stopTyping();
    }, 1500);

});

function stopTyping(){

    if(isTyping){
        isTyping = false;
        socket.emit("stop-typing");
    }

}

/* =========================================================
SOCKET EVENTS
========================================================= */

/* WAITING */

socket.on("waiting", ()=>{

    isSearching = true;
    isConnected = false;

    document.getElementById("status").innerText = "Waiting for stranger...";

    addMessage("Waiting for someone to join...","system");

});

/* MATCHED */

socket.on("matched", (data)=>{

    isConnected = true;
    isSearching = false;

    partnerName = data.name || "Stranger";

    document.getElementById("partner").innerText = partnerName;
    document.getElementById("status").innerText = "Connected";

    addMessage("You are now connected to " + partnerName,"system");

});

/* RECEIVE MESSAGE */

socket.on("message", (msg)=>{

    if(!isConnected) return;

    addMessage(msg.text,"stranger");

});

/* STRANGER DISCONNECTED */

socket.on("stranger-disconnected", ()=>{

    isConnected = false;
    isSearching = true;

    document.getElementById("status").innerText = "Stranger left";

    addMessage("Stranger disconnected.","system");

});

/* TYPING */

socket.on("typing", ()=>{

    if(!isConnected) return;

    showTypingIndicator();

});

socket.on("stop-typing", ()=>{

    removeTypingIndicator();

});

/* =========================================================
TYPING UI
========================================================= */

function showTypingIndicator(){

    let existing = document.getElementById("typing");

    if(existing) return;

    const chat = document.getElementById("chat");

    const div = document.createElement("div");
    div.className = "system";
    div.id = "typing";
    div.innerText = "Stranger is typing...";

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

}

function removeTypingIndicator(){

    let el = document.getElementById("typing");

    if(el) el.remove();

}

/* =========================================================
CONNECTION EVENTS
========================================================= */

socket.on("connect", ()=>{
    console.log("Connected to server");
});

socket.on("disconnect", ()=>{

    isConnected = false;
    isSearching = false;

    document.getElementById("status").innerText = "Disconnected";

    addMessage("Connection lost. Trying to reconnect...","system");

});

/* =========================================================
ERROR HANDLING
========================================================= */

socket.on("connect_error", ()=>{
    addMessage("Server connection failed.","system");
});

socket.on("error", (err)=>{
    console.log(err);
    addMessage("Something went wrong.","system");
});

/* =========================================================
AUTO SCROLL SAFETY
========================================================= */

const chatBox = document.getElementById("chat");

chatBox.addEventListener("scroll", ()=>{
    // future scroll logic
});

/* =========================================================
FOCUS INPUT
========================================================= */

setInterval(()=>{
    document.getElementById("msg").focus();
},2000);

/* =========================================================
DEBUG HELPERS (OPTIONAL)
========================================================= */

window.debug = {
    socket,
    state: ()=>{
        return {
            isConnected,
            isSearching,
            myName,
            partnerName
        };
    }
};

</script>
<!-- ================= SCRIPT PART 3 ================= -->

<script>

/* =========================================================
MESSAGE TIME FORMAT
========================================================= */

function formatTime(timestamp){

    const date = new Date(timestamp);

    let hours = date.getHours();
    let minutes = date.getMinutes();

    if(minutes < 10) minutes = "0" + minutes;

    return hours + ":" + minutes;
}

/* =========================================================
ENHANCED MESSAGE RENDER
========================================================= */

const originalAddMessage = addMessage;

addMessage = function(text,type,time = Date.now()){

    const chat = document.getElementById("chat");

    const msg = document.createElement("div");

    if(type === "system"){
        msg.className = "system";
        msg.innerText = text;
    }else{

        msg.className = "msg " + type;

        const timeStr = formatTime(time);

        msg.innerHTML = `
            <div class="bubble">
                ${text}
                <div style="font-size:10px;opacity:0.6;margin-top:5px;text-align:right;">
                    ${timeStr}
                </div>
            </div>
        `;
    }

    chat.appendChild(msg);

    smartScroll();
};

/* =========================================================
SMART AUTO SCROLL
========================================================= */

function smartScroll(){

    const chat = document.getElementById("chat");

    const isNearBottom = chat.scrollHeight - chat.scrollTop <= chat.clientHeight + 100;

    if(isNearBottom){
        chat.scrollTop = chat.scrollHeight;
    }

}

/* =========================================================
SOUND SYSTEM
========================================================= */

const msgSound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

function playSound(){

    msgSound.currentTime = 0;
    msgSound.play().catch(()=>{});

}

/* =========================================================
OVERRIDE MESSAGE RECEIVE (ADD SOUND)
========================================================= */

socket.off("message");

socket.on("message", (msg)=>{

    if(!isConnected) return;

    addMessage(msg.text,"stranger",msg.time);

    playSound();

});

/* =========================================================
IDLE DETECTION
========================================================= */

let idleTimer = null;

function resetIdle(){

    clearTimeout(idleTimer);

    idleTimer = setTimeout(()=>{
        if(isConnected){
            addMessage("Are you still there?","system");
        }
    },30000); // 30 sec

}

document.addEventListener("mousemove", resetIdle);
document.addEventListener("keypress", resetIdle);

/* =========================================================
INPUT UX IMPROVEMENTS
========================================================= */

const inputBox = document.getElementById("msg");

inputBox.addEventListener("focus", ()=>{
    inputBox.style.outline = "2px solid #22c55e";
});

inputBox.addEventListener("blur", ()=>{
    inputBox.style.outline = "none";
});

/* =========================================================
DISABLE INPUT WHEN NOT CONNECTED
========================================================= */

setInterval(()=>{

    if(!isConnected){
        inputBox.disabled = true;
        inputBox.placeholder = "Waiting for connection...";
    }else{
        inputBox.disabled = false;
        inputBox.placeholder = "Type message...";
    }

},500);

/* =========================================================
CONNECTION RETRY VISUAL
========================================================= */

let retryCount = 0;

socket.io.on("reconnect_attempt", ()=>{
    retryCount++;
    addMessage("Reconnecting... Attempt " + retryCount,"system");
});

socket.io.on("reconnect", ()=>{
    retryCount = 0;
    addMessage("Reconnected successfully","system");
});

/* =========================================================
SMOOTH FADE MESSAGE
========================================================= */

const style = document.createElement("style");
style.innerHTML = `
.msg, .system{
    animation:fadeMsg 0.3s ease;
}
@keyframes fadeMsg{
    from{opacity:0;transform:translateY(5px);}
    to{opacity:1;transform:translateY(0);}
}
`;
document.head.appendChild(style);

/* =========================================================
CLICK SOUND ON SEND
========================================================= */

const sendBtnSound = new Audio("https://www.soundjay.com/buttons/sounds/button-16.mp3");

const originalSend = sendMsg;

sendMsg = function(){

    if(!isConnected) return;

    sendBtnSound.currentTime = 0;
    sendBtnSound.play().catch(()=>{});

    originalSend();
};

/* =========================================================
AUTO CLEAR OLD MESSAGES (PERFORMANCE)
========================================================= */

function cleanChat(){

    const chat = document.getElementById("chat");

    if(chat.children.length > 200){
        chat.removeChild(chat.firstChild);
    }

}

setInterval(cleanChat,5000);

/* =========================================================
PAGE VISIBILITY (SMART NOTIFICATION)
========================================================= */

document.addEventListener("visibilitychange", ()=>{

    if(document.hidden){
        console.log("User not active tab");
    }

});

/* =========================================================
QUICK KEY SHORTCUTS
========================================================= */

document.addEventListener("keydown", (e)=>{

    if(e.key === "Escape"){
        nextUser();
    }

});

/* =========================================================
WELCOME MESSAGE
========================================================= */

setTimeout(()=>{
    addMessage("Welcome to CHATGRAM 🚀","system");
},1000);

</script>
<!-- ================= SCRIPT PART 4 ================= -->

<script>

/* =========================================================
FAKE ONLINE USER COUNTER
========================================================= */

let fakeUsers = Math.floor(Math.random() * 500) + 200;

function updateFakeUsers(){

    const variance = Math.floor(Math.random() * 20);

    if(Math.random() > 0.5){
        fakeUsers += variance;
    }else{
        fakeUsers -= variance;
    }

    if(fakeUsers < 100) fakeUsers = 150;

    updateUserDisplay();

}

function updateUserDisplay(){

    let el = document.getElementById("onlineCount");

    if(!el){
        el = document.createElement("div");
        el.id = "onlineCount";
        el.style.fontSize = "12px";
        el.style.color = "#94a3b8";

        document.querySelector(".header-left").appendChild(el);
    }

    el.innerText = fakeUsers + " users online";

}

setInterval(updateFakeUsers, 3000);
updateUserDisplay();

/* =========================================================
RANDOM MATCH DELAY SYSTEM
========================================================= */

let matchDelayTimer = null;

function startMatching(){

    isSearching = true;
    isConnected = false;

    document.getElementById("status").innerText = "Searching...";
    document.getElementById("partner").innerText = "Stranger";

    addMessage("Looking for a stranger...","system");

    const delay = Math.random() * 2000 + 1000; // 1-3 sec

    clearTimeout(matchDelayTimer);

    matchDelayTimer = setTimeout(()=>{

        socket.emit("start", {
            name: myName
        });

    }, delay);

}

/* =========================================================
LIGHT BOT SYSTEM (WHEN NO MATCH)
========================================================= */

let botMode = false;

function activateBot(){

    botMode = true;

    document.getElementById("status").innerText = "Connected";

    addMessage("Connected to Stranger","system");

    simulateBotConversation();

}

function simulateBotConversation(){

    const messages = [
        "Hey",
        "Where are you from?",
        "Nice 🙂",
        "What do you do?",
        "That's cool",
        "Tell me more"
    ];

    let index = 0;

    const interval = setInterval(()=>{

        if(!botMode || index >= messages.length){
            clearInterval(interval);
            return;
        }

        addMessage(messages[index],"stranger");
        playSound();

        index++;

    }, Math.random()*2000 + 1500);

}

/* =========================================================
ENGAGEMENT PROMPTS
========================================================= */

const prompts = [
    "Ask them their favorite movie 🎬",
    "Try asking where they are from 🌍",
    "Share something interesting about yourself 😄",
    "Ask a random question 🤔"
];

function showPrompt(){

    if(!isConnected) return;

    const random = prompts[Math.floor(Math.random()*prompts.length)];

    addMessage(random,"system");

}

setInterval(showPrompt, 20000);

/* =========================================================
AUTO NEXT ON LONG IDLE
========================================================= */

let longIdleTimer = null;

function resetLongIdle(){

    clearTimeout(longIdleTimer);

    longIdleTimer = setTimeout(()=>{

        if(isConnected){
            addMessage("No activity. Finding new stranger...","system");
            nextUser();
        }

    }, 120000); // 2 min

}

document.addEventListener("mousemove", resetLongIdle);
document.addEventListener("keypress", resetLongIdle);

/* =========================================================
SESSION STATS
========================================================= */

let sessionStats = {
    messagesSent: 0,
    strangersMet: 0,
    startTime: Date.now()
};

function updateStats(){

    let el = document.getElementById("stats");

    if(!el){
        el = document.createElement("div");
        el.id = "stats";
        el.style.fontSize = "10px";
        el.style.color = "#64748b";

        document.querySelector(".header-left").appendChild(el);
    }

    const minutes = Math.floor((Date.now() - sessionStats.startTime)/60000);

    el.innerText = `Chats: ${sessionStats.strangersMet} | Msg: ${sessionStats.messagesSent} | Time: ${minutes}m`;

}

setInterval(updateStats,5000);

/* =========================================================
HOOK INTO EXISTING EVENTS
========================================================= */

const oldMatched = socket.listeners("matched")[0];

socket.off("matched");

socket.on("matched",(data)=>{

    sessionStats.strangersMet++;

    if(oldMatched) oldMatched(data);

});

/* =========================================================
COUNT MESSAGES
========================================================= */

const oldSend = sendMsg;

sendMsg = function(){

    sessionStats.messagesSent++;

    oldSend();

};

/* =========================================================
SMART RECONNECT FLOW
========================================================= */

socket.on("disconnect", ()=>{

    isConnected = false;

    addMessage("Reconnecting automatically...","system");

});

socket.io.on("reconnect", ()=>{

    addMessage("Back online! Finding new match...","system");

    startMatching();

});

/* =========================================================
ACTIVITY HEAT SYSTEM (FUN LOGIC)
========================================================= */

let activityScore = 0;

function increaseActivity(){

    activityScore++;

    if(activityScore > 10){
        addMessage("🔥 You're on fire! Keep chatting!","system");
        activityScore = 0;
    }

}

document.addEventListener("keypress", increaseActivity);

/* =========================================================
SMART GREETING VARIATIONS
========================================================= */

const greetings = [
    "Say hi 👋",
    "Start with a joke 😂",
    "Ask something unique ✨",
    "Try a fun question 🎲"
];

function randomGreeting(){

    const g = greetings[Math.floor(Math.random()*greetings.length)];

    addMessage(g,"system");

}

socket.on("matched", ()=>{
    setTimeout(randomGreeting, 2000);
});

/* =========================================================
PREVENT SPAM CLICK NEXT
========================================================= */

let nextCooldown = false;

const oldNext = nextUser;

nextUser = function(){

    if(nextCooldown) return;

    nextCooldown = true;

    oldNext();

    setTimeout(()=>{
        nextCooldown = false;
    },2000);

};

/* =========================================================
BACKGROUND DYNAMIC EFFECT
========================================================= */

let hue = 220;

setInterval(()=>{

    hue += 1;

    document.body.style.background =
        `linear-gradient(135deg,hsl(${hue},40%,10%),hsl(${hue+30},40%,20%))`;

},5000);

/* =========================================================
FUN RANDOM SYSTEM MESSAGES
========================================================= */

const randomMsgs = [
    "💡 Tip: Be respectful",
    "⚡ Fast chatting increases matches",
    "🎯 Try asking interesting questions",
    "🔥 Active users get better matches"
];

setInterval(()=>{

    if(Math.random() > 0.7){
        const msg = randomMsgs[Math.floor(Math.random()*randomMsgs.length)];
        addMessage(msg,"system");
    }

},25000);

</script>
<!-- ================= SCRIPT PART 5 ================= -->

<script>

/* =========================================================
GLOBAL ERROR HANDLER
========================================================= */

window.onerror = function(msg, url, line, col, error){

    console.error("Error:", msg);

    addMessage("⚠️ Something went wrong. Refresh recommended.","system");

    return false;
};

/* =========================================================
SAFE SOCKET EMIT WRAPPER
========================================================= */

function safeEmit(event, data){

    if(socket && socket.connected){
        socket.emit(event, data);
    }else{
        addMessage("⚠️ Not connected to server","system");
    }

}

/* =========================================================
OVERRIDE SEND (SAFE VERSION)
========================================================= */

const oldSendFinal = sendMsg;

sendMsg = function(){

    if(!isConnected){
        addMessage("⚠️ Not connected yet","system");
        return;
    }

    oldSendFinal();

};

/* =========================================================
CONNECTION HEALTH CHECK
========================================================= */

setInterval(()=>{

    if(socket && !socket.connected){
        document.getElementById("status").innerText = "Reconnecting...";
    }

},3000);

/* =========================================================
LOADER SYSTEM
========================================================= */

function showLoader(){

    let loader = document.getElementById("loader");

    if(loader) return;

    loader = document.createElement("div");
    loader.id = "loader";
    loader.innerText = "Connecting...";
    loader.style.position = "absolute";
    loader.style.top = "50%";
    loader.style.left = "50%";
    loader.style.transform = "translate(-50%,-50%)";
    loader.style.background = "#000";
    loader.style.padding = "10px 20px";
    loader.style.borderRadius = "8px";

    document.body.appendChild(loader);

}

function hideLoader(){

    let loader = document.getElementById("loader");

    if(loader) loader.remove();

}

/* =========================================================
HOOK INTO MATCH FLOW
========================================================= */

socket.on("waiting", showLoader);
socket.on("matched", hideLoader);

/* =========================================================
MOBILE OPTIMIZATION
========================================================= */

function mobileFix(){

    if(window.innerWidth < 600){

        document.querySelector(".container").style.width = "100%";
        document.querySelector(".container").style.height = "100vh";

    }

}

window.addEventListener("resize", mobileFix);
mobileFix();

/* =========================================================
SMOOTH SCROLL BEHAVIOR
========================================================= */

document.getElementById("chat").style.scrollBehavior = "smooth";

/* =========================================================
MESSAGE LIMIT HARD CAP
========================================================= */

function hardLimit(){

    const chat = document.getElementById("chat");

    if(chat.children.length > 300){

        for(let i=0;i<50;i++){
            if(chat.firstChild) chat.removeChild(chat.firstChild);
        }

    }

}

setInterval(hardLimit,7000);

/* =========================================================
ANTI-SPAM MESSAGE CONTROL
========================================================= */

let lastMsgTime = 0;

const oldSendSpam = sendMsg;

sendMsg = function(){

    const now = Date.now();

    if(now - lastMsgTime < 500){
        addMessage("⚠️ You're sending too fast","system");
        return;
    }

    lastMsgTime = now;

    oldSendSpam();

};

/* =========================================================
NETWORK QUALITY INDICATOR
========================================================= */

let ping = 0;

setInterval(()=>{

    const start = Date.now();

    socket.emit("ping-check");

    socket.once("pong-check", ()=>{
        ping = Date.now() - start;

        let status = "Good";

        if(ping > 300) status = "Slow";
        if(ping > 600) status = "Bad";

        document.getElementById("status").innerText =
            (isConnected ? "Connected" : "Connecting") + " • " + status;

    });

},5000);

/* =========================================================
THEME TOGGLE (DARK / LIGHT)
========================================================= */

let darkMode = true;

function toggleTheme(){

    darkMode = !darkMode;

    if(darkMode){
        document.body.style.background = "#0f172a";
    }else{
        document.body.style.background = "#f1f5f9";
    }

}

document.addEventListener("keydown",(e)=>{
    if(e.key === "t"){
        toggleTheme();
    }
});

/* =========================================================
AUTO RECONNECT BUTTON
========================================================= */

function addReconnectBtn(){

    let btn = document.getElementById("reconnectBtn");

    if(btn) return;

    btn = document.createElement("button");
    btn.id = "reconnectBtn";
    btn.innerText = "Reconnect";
    btn.style.position = "absolute";
    btn.style.top = "10px";
    btn.style.right = "10px";

    btn.onclick = ()=>{
        socket.connect();
        startMatching();
    };

    document.body.appendChild(btn);

}

socket.on("disconnect", addReconnectBtn);

/* =========================================================
EMOJI SUPPORT
========================================================= */

function parseEmoji(text){

    return text
        .replace(":)","😊")
        .replace(":(","😢")
        .replace("<3","❤️");

}

const oldAddFinal = addMessage;

addMessage = function(text,type,time){

    text = parseEmoji(text);

    oldAddFinal(text,type,time);

};

/* =========================================================
COPY MESSAGE FEATURE
========================================================= */

document.addEventListener("dblclick",(e)=>{

    if(e.target.classList.contains("bubble")){

        navigator.clipboard.writeText(e.target.innerText);

        addMessage("Copied to clipboard","system");

    }

});

/* =========================================================
NOTIFICATION API
========================================================= */

if("Notification" in window){
    Notification.requestPermission();
}

function notify(text){

    if(document.hidden && Notification.permission === "granted"){
        new Notification("New Message", { body: text });
    }

}

socket.on("message",(msg)=>{
    notify(msg.text);
});

/* =========================================================
TAB TITLE CHANGE
========================================================= */

const originalTitle = document.title;

socket.on("message",()=>{

    if(document.hidden){
        document.title = "💬 New Message!";
    }

});

document.addEventListener("visibilitychange",()=>{
    if(!document.hidden){
        document.title = originalTitle;
    }
});

/* =========================================================
FINAL WELCOME
========================================================= */

setTimeout(()=>{
    addMessage("🔥 CHATGRAM Ready. Start chatting!","system");
},1500);

</script>
</body>
</html>
