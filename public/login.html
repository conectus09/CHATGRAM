<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHATGRAM - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* =====================================================
GLOBAL
===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

/* BACKGROUND IMAGE */

background-image:url("https://images.unsplash.com/photo-1522202176988-66273c2fd55f");

background-size:cover;
background-position:center;

position:relative;

overflow:hidden;

}

/* DARK OVERLAY */

body::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
120deg,
rgba(2,6,23,.85),
rgba(15,23,42,.85),
rgba(30,41,59,.85)
);

z-index:0;

}

/* =====================================================
ANIMATED PARTICLES
===================================================== */

.particles{

position:absolute;

width:100%;
height:100%;

overflow:hidden;

z-index:0;

}

.particles span{

position:absolute;

display:block;

width:8px;
height:8px;

background:#38bdf8;

border-radius:50%;

animation:float 15s linear infinite;

opacity:.6;

}

@keyframes float{

0%{
transform:translateY(0) scale(0.8);
}

100%{
transform:translateY(-1200px) scale(1.3);
}

}

/* =====================================================
MAIN CONTAINER
===================================================== */

.container{

position:relative;

z-index:2;

width:100%;
max-width:1000px;

padding:40px;

text-align:center;

}

/* =====================================================
LOGO
===================================================== */

.logo{

font-size:70px;

font-weight:700;

letter-spacing:4px;

margin-bottom:10px;

}

.logo span{

color:#38bdf8;

}

/* =====================================================
SUBTITLE
===================================================== */

.subtitle{

font-size:20px;

opacity:.8;

margin-bottom:50px;

}

/* =====================================================
CHAT OPTIONS
===================================================== */

.options{

display:flex;

gap:30px;

justify-content:center;

flex-wrap:wrap;

margin-bottom:50px;

}

/* OPTION CARD */

.option{

flex:1;

min-width:260px;

padding:40px;

border-radius:20px;

background:rgba(255,255,255,0.07);

border:1px solid rgba(255,255,255,0.15);

backdrop-filter:blur(20px);

cursor:pointer;

transition:all .3s;

}

.option:hover{

transform:translateY(-10px) scale(1.02);

background:linear-gradient(45deg,#3b82f6,#06b6d4);

box-shadow:0 20px 50px rgba(0,0,0,0.6);

}

/* ICON */

.icon{

font-size:45px;

margin-bottom:15px;

}

/* TITLE */

.option h2{

font-size:28px;

margin-bottom:10px;

}

/* TEXT */

.option p{

font-size:14px;

opacity:.85;

}

/* =====================================================
LOGIN BOX
===================================================== */

.login{

margin-top:40px;

background:rgba(255,255,255,0.07);

padding:45px;

border-radius:20px;

border:1px solid rgba(255,255,255,0.15);

backdrop-filter:blur(25px);

max-width:420px;

margin-left:auto;
margin-right:auto;

box-shadow:0 20px 60px rgba(0,0,0,0.5);

}

.login h3{

margin-bottom:25px;

font-size:22px;

}

/* INPUT */

input{

width:100%;

padding:15px;

margin-bottom:15px;

border:none;

border-radius:10px;

background:rgba(255,255,255,0.08);

color:white;

outline:none;

transition:.2s;

}

input:focus{

background:rgba(255,255,255,0.12);

}

/* BUTTON */

.login button{

width:100%;

padding:15px;

border:none;

border-radius:12px;

background:linear-gradient(45deg,#3b82f6,#06b6d4);

cursor:pointer;

font-size:16px;

color:white;

transition:.3s;

}

.login button:hover{

transform:translateY(-3px);

box-shadow:0 10px 30px rgba(0,0,0,.4);

}

/* GOOGLE BUTTON */

.google{

margin-top:10px;

background:#ffffff;

color:black;

}

/* =====================================================
FOOT TEXT
===================================================== */

.note{

margin-top:20px;

font-size:13px;

opacity:.6;

}

/* =====================================================
FOOTER
===================================================== */

.footer{

margin-top:40px;

opacity:.6;

font-size:13px;

}

/* =====================================================
MOBILE
===================================================== */

@media(max-width:700px){

.logo{
font-size:50px;
}

.options{
flex-direction:column;
}

.container{
padding:20px;
}

}

</style>

</head>

<body>

<!-- PARTICLES -->

<div class="particles">

<span style="left:10%;animation-delay:0s"></span> <span style="left:20%;animation-delay:2s"></span> <span style="left:30%;animation-delay:4s"></span> <span style="left:40%;animation-delay:1s"></span> <span style="left:50%;animation-delay:3s"></span> <span style="left:60%;animation-delay:5s"></span> <span style="left:70%;animation-delay:2s"></span> <span style="left:80%;animation-delay:6s"></span> <span style="left:90%;animation-delay:4s"></span>

</div>

<div class="container">

<div class="logo">
CHAT<span>GRAM</span>
</div>

<p class="subtitle">
Talk to strangers. Make new friends instantly.
</p>

<!-- CHAT OPTIONS -->

<div class="options">

<div class="option" onclick="goRandom()">

<div class="icon">🎲</div>

<h2>Random Chat</h2>

<p>
Start chatting with strangers instantly.
</p>

</div>

<div class="option">

<div class="icon">📹</div>

<h2>Video Chat</h2>

<p>
Meet people face to face using video.
</p>

</div>

</div>

<!-- LOGIN -->

<div class="login">

<h3>Sign In</h3>

<input type="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<button class="google">Login with Google</button>

<p class="note">
Connect with people around the world instantly.
</p>

</div>

<div class="footer">

© 2026 CHATGRAM

</div>

</div>

<script>

/* RANDOM CHAT REDIRECT */

function goRandom(){

window.location.href="random.html";

}

</script>

</body>
</html>
