<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUMPY – Login</title>
<style>
* {
    margin: 0; padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}
body {
    height: 100vh;
    background: url("https://isomer-user-content.by.gov.sg/85/b8be5e01-fb19-4e93-bf94-f4bceac5b5d1/Text_me__Instant_messaging_through_the_years.jpg") no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(10,20,40,0.80);
    backdrop-filter: blur(16px);
}
.scale-wrapper {
    transform: scale(1.2);
    transform-origin: center;
}
.container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 460px;
    text-align: center;
    color: white;
}
.logo {
    font-size: 100px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #00c6ff, #00ff9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.title {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
    min-height: 28px;
    transition: 0.3s;
}
.card {
    margin-top: 30px;
    padding: 30px;
    border-radius: 24px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
}
.google-btn {
    margin-top: 10px;
    padding: 16px;
    width: 100%;
    border-radius: 14px;
    border: none;
    background: white;
    color: #333;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    transition: 0.3s;
}
.google-btn:hover { transform: scale(1.04); box-shadow: 0 6px 30px rgba(0,198,255,0.3); }
.google-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.google-icon img { width: 22px; height: 22px; }
.user-info {
    margin-top: 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 12px;
}
.user-info img { width: 60px; height: 60px; border-radius: 50%; border: 3px solid #00ff9d; }
.user-info .name { font-size: 18px; font-weight: bold; color: white; }
.user-info .email-text { font-size: 13px; opacity: 0.7; color: white; }
.status { margin-top: 16px; font-size: 13px; min-height: 18px; color: #00ff9d; }
.error-msg { color: #ff6b6b; font-size: 13px; margin-top: 10px; display: none; }

/* ── Devtools overlay — body replace nahi karta ── */
#dt-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: #0a1428;
    z-index: 99999;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: sans-serif;
    text-align: center;
    gap: 16px;
}
</style>
</head>
<body>

<!-- Devtools blocked screen — overlay hai, body replace nahi -->
<div id="dt-overlay">
    <div style="font-size:60px">🚫</div>
    <div style="font-size:28px;font-weight:800;color:#ff4444">Access Denied</div>
    <div style="font-size:16px;color:#90a4ae">Developer Tools detected.<br>This activity is not allowed.</div>
</div>

<div class="scale-wrapper">
<div class="container">
    <div class="logo">BUMPY</div>
    <div class="title" id="mainTitle">Continue with Google</div>

    <div class="card">
        <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
            <span class="google-icon">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            </span>
            Continue with Google
        </button>

        <div class="user-info" id="userInfo">
            <img id="userPhoto" src="" alt="">
            <div class="name" id="userName"></div>
            <div class="email-text" id="userEmail"></div>
        </div>

        <div class="status" id="statusMsg"></div>
        <div class="error-msg" id="errorMsg"></div>
    </div>
</div>
</div>

<!-- ══ FIREBASE ══ -->
<script type="module">
    import { initializeApp }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
        apiKey:            "AIzaSyAkyuA8xY3LyBdNn9_l9aniAfJ7fjMS__0",
        authDomain:        "bumpy-c0feb.firebaseapp.com",
        projectId:         "bumpy-c0feb",
        storageBucket:     "bumpy-c0feb.firebasestorage.app",
        messagingSenderId: "1007047112567",
        appId:             "1:1007047112567:web:a14858e9d4c2d6de579372"
    };

    const app      = initializeApp(firebaseConfig);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    const btn      = document.getElementById("googleBtn");
    const titleEl  = document.getElementById("mainTitle");
    const statusEl = document.getElementById("statusMsg");
    const errorEl  = document.getElementById("errorMsg");
    const userInfo = document.getElementById("userInfo");

    // ✅ Yeh flag devtools protection ko batata hai — "ab redirect ho raha hai, rok mat"
    window.isRedirecting = false;

    // Pehle se logged in? → seedha home.html
    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.isRedirecting = true;
            showUser(user);
            titleEl.innerText  = "Welcome back!";
            statusEl.innerText = "Redirecting...";
            setTimeout(() => { window.location.href = "home.html"; }, 900);
        }
    });

    window.signInWithGoogle = async function () {
        btn.disabled          = true;
        errorEl.style.display = "none";
        titleEl.innerText     = "Signing in...";
        statusEl.innerText    = "Google account choose karo...";

        try {
            const result = await signInWithPopup(auth, provider);
            const user   = result.user;

            window.isRedirecting = true;   // ✅ Devtools block band
            showUser(user);
            titleEl.innerText  = `Hey, ${user.displayName.split(" ")[0]}! 👋`;
            statusEl.innerText = "Login successful! Redirecting...";
            setTimeout(() => { window.location.href = "home.html"; }, 900);

        } catch (err) {
            btn.disabled          = false;
            titleEl.innerText     = "Continue with Google";
            statusEl.innerText    = "";
            const msgs = {
                "auth/popup-closed-by-user":     "Popup band ho gaya, dobara try karo.",
                "auth/cancelled-popup-request":  "Request cancel ho gayi.",
                "auth/network-request-failed":   "Network error. Internet check karo.",
                "auth/unauthorized-domain":      "Ye domain Firebase mein register nahi.",
            };
            errorEl.innerText     = msgs[err.code] || `Error: ${err.message}`;
            errorEl.style.display = "block";
        }
    };

    function showUser(user) {
        document.getElementById("userPhoto").src      = user.photoURL || "";
        document.getElementById("userName").innerText  = user.displayName || "User";
        document.getElementById("userEmail").innerText = user.email || "";
        userInfo.style.display = "flex";
        btn.style.display      = "none";
    }
</script>

<!-- ══ DEVTOOLS PROTECTION ══ -->
<script>
(function () {
    var overlay = document.getElementById("dt-overlay");

    // Right click band
    document.addEventListener("contextmenu", function(e){ e.preventDefault(); });

    // Keyboard shortcuts band
    document.addEventListener("keydown", function(e){
        if (e.key === "F12") { e.preventDefault(); return false; }
        if (e.ctrlKey && e.shiftKey && ["I","J","C"].includes(e.key)) { e.preventDefault(); return false; }
        if (e.ctrlKey && ["u","s","a","c","p"].includes(e.key)) { e.preventDefault(); return false; }
    });

    // Select + drag band
    document.addEventListener("selectstart", function(e){ e.preventDefault(); });
    document.addEventListener("dragstart",   function(e){ e.preventDefault(); });

    // Console silence
    console.log = console.warn = console.error = console.info = function(){};
    console.clear();

    // ✅ FIXED: body.innerHTML replace nahi — overlay show/hide
    // ✅ FIXED: isRedirecting true ho toh kuch nahi karo
    setInterval(function(){
        if (window.isRedirecting) { overlay.style.display = "none"; return; }
        var open = window.outerWidth  - window.innerWidth  > 160 ||
                   window.outerHeight - window.innerHeight > 160;
        overlay.style.display = open ? "flex" : "none";
    }, 1000);

    // ✅ FIXED: Debugger trap — isRedirecting check, body replace nahi
    setInterval(function(){
        if (window.isRedirecting) return;
        var d = new Date();
        debugger;
        if (new Date() - d > 100) {
            overlay.style.display = "flex";
        }
    }, 3000);

})();
</script>

</body>
</html>
