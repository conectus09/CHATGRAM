<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="home.css">
</head>
<body>

<!-- ======================= PROFILE SETUP SCREEN ======================= -->
<div id="profileScreen" class="screen active">
    <div class="auth-container">
        <div class="auth-logo">
            <i class="fas fa-paper-plane"></i>
            <h1>Telegram</h1>
        </div>

        <div class="profile-form">
            <h2>Complete Your Profile</h2>
            <p>Add your profile picture and information</p>
            
            <div class="form-group">
                <div class="avatar-upload">
                    <div id="avatarPreview" class="avatar-placeholder">
                        <i class="fas fa-user"></i>
                    </div>
                    <input type="file" id="avatarFile" accept="image/*" onchange="previewAvatar()">
                    <label for="avatarFile">Upload Photo</label>
                </div>
            </div>

            <div class="form-group">
                <input type="text" id="firstName" placeholder="First Name" required>
            </div>

            <div class="form-group">
                <input type="text" id="lastName" placeholder="Last Name (optional)">
            </div>

            <div class="form-group">
                <input type="text" id="username" placeholder="@username (unique)" required>
                <small id="usernameStatus" class="status-text"></small>
            </div>

            <div class="form-group">
                <textarea id="bio" placeholder="Bio (optional)" rows="3"></textarea>
            </div>

            <button class="btn-primary" onclick="completeProfile()">Continue</button>
            
            <div id="authError" class="error-message"></div>
        </div>
    </div>
</div>

<!-- ======================= MAIN APP SCREEN ======================= -->
<div id="mainScreen" class="screen">
    <div class="app-container">
        <!-- SIDEBAR / CHATS LIST -->
        <div class="sidebar">
            <!-- Header -->
            <div class="sidebar-header">
                <h1>Telegram</h1>
                <div class="header-buttons">
                    <button id="searchBtn" title="Search"><i class="fas fa-search"></i></button>
                    <button id="menuBtn" title="Menu"><i class="fas fa-ellipsis-v"></i></button>
                </div>
            </div>

            <!-- Search Bar -->
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="chatSearch" placeholder="Search or start new chat...">
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <div class="tab active" data-tab="chats">Chats</div>
                <div class="tab" data-tab="contacts">Contacts</div>
                <div class="tab" data-tab="calls">Calls</div>
            </div>

            <!-- Chats List -->
            <div id="chatsList" class="chats-list">
                <!-- Chat items dynamically added -->
            </div>

            <!-- Contacts List -->
            <div id="contactsList" class="contacts-list hidden">
                <!-- Contacts dynamically added -->
            </div>

            <!-- Calls List -->
            <div id="callsList" class="calls-list hidden">
                <!-- Calls dynamically added -->
            </div>

            <!-- FAB -->
            <button id="newChatBtn" class="fab-button" title="New Chat">
                <i class="fas fa-pen"></i>
            </button>
        </div>

        <!-- CHAT AREA -->
        <div class="chat-area">
            <!-- No Chat Selected -->
            <div id="noChatSelected" class="no-chat-screen">
                <div class="empty-state">
                    <i class="fas fa-comments"></i>
                    <h2>Select a chat to start messaging</h2>
                </div>
            </div>

            <!-- Active Chat -->
            <div id="chatWindow" class="chat-window hidden">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-header-info">
                        <h2 id="chatName"></h2>
                        <p id="chatStatus"></p>
                    </div>
                    <div class="chat-header-buttons">
                        <button class="icon-btn" title="Search"><i class="fas fa-search"></i></button>
                        <button class="icon-btn" title="Call"><i class="fas fa-phone"></i></button>
                        <button class="icon-btn" title="Video Call"><i class="fas fa-video"></i></button>
                        <button class="icon-btn" id="chatMenuBtn" title="Menu"><i class="fas fa-ellipsis-v"></i></button>
                    </div>
                </div>

                <!-- Messages -->
                <div id="messagesArea" class="messages-area">
                    <!-- Messages dynamically added -->
                </div>

                <!-- Message Input -->
                <div class="message-input-area">
                    <div class="input-wrapper">
                        <button id="attachBtn" class="input-icon-btn" title="Attach"><i class="fas fa-plus"></i></button>
                        <input type="text" id="messageInput" placeholder="Message...">
                        <button id="emojiBtn" class="input-icon-btn" title="Emoji"><i class="fas fa-smile"></i></button>
                        <button id="sendBtn" class="input-icon-btn send-btn" title="Send"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ======================= MODALS ======================= -->

<!-- New Chat Modal -->
<div id="newChatModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>New Chat</h2>
            <button class="close-btn" onclick="closeModal('newChatModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="userSearch" placeholder="Search users by @username...">
            </div>
            <div id="usersSearchResults" class="users-list">
                <!-- Results dynamically added -->
            </div>
        </div>
    </div>
</div>

<!-- Chat Info Modal -->
<div id="chatInfoModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Chat Info</h2>
            <button class="close-btn" onclick="closeModal('chatInfoModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="chat-info-content">
                <div class="chat-avatar" id="infoAvatar"></div>
                <h2 id="infoName"></h2>
                <p id="infoUsername"></p>
                <p id="infoBio"></p>
                <div class="info-section">
                    <h3>Settings</h3>
                    <button onclick="muteChat()">Mute Notifications</button>
                    <button onclick="clearChat()">Clear Chat</button>
                    <button onclick="deleteChat()" class="btn-danger">Delete Chat</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="settingsModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Settings</h2>
            <button class="close-btn" onclick="closeModal('settingsModal')">&times;</button>
        </div>
        <div class="modal-body">
            <div class="settings-section">
                <h3>Account</h3>
                <div class="setting-item">
                    <label>Name</label>
                    <input type="text" id="settingName" readonly>
                </div>
                <div class="setting-item">
                    <label>Username</label>
                    <input type="text" id="settingUsername" readonly>
                </div>
                <div class="setting-item">
                    <label>Email</label>
                    <input type="email" id="settingEmail" readonly>
                </div>
                <div class="setting-item">
                    <label>Bio</label>
                    <input type="text" id="settingBio">
                </div>
                <div class="setting-item">
                    <label>Status</label>
                    <input type="text" id="settingStatus">
                </div>
            </div>
            <div class="settings-section">
                <h3>Privacy & Security</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="lastSeenPrivacy">
                        Hide last seen
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="readReceiptsPrivacy">
                        Disable read receipts
                    </label>
                </div>
            </div>
            <div class="settings-section">
                <h3>Preferences</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="darkModeToggle">
                        Dark Mode
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="notificationsToggle" checked>
                        Enable Notifications
                    </label>
                </div>
            </div>
            <button class="btn-primary" onclick="saveSettings()" style="width: 100%;">Save Changes</button>
            <button class="btn-danger" onclick="logoutUser()" style="width: 100%; margin-top: 10px;">Logout</button>
        </div>
    </div>
</div>

<!-- Loading Spinner -->
<div id="loadingSpinner" class="loading-spinner hidden">
    <div class="spinner"></div>
</div>

<!-- Toast Notification -->
<div id="toast" class="toast"></div>

<!-- Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-auth.js"></script>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="app.js"></script>

</body>
</html>
