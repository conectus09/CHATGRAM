<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickChat Login</title>
  <link rel="stylesheet" href="index.css" />
</head>
<body>
  <div class="container">
    <div class="login-card">
      <img src="logo.jpg" alt="QuickChat Logo" class="logo" />

      <h1>QuickChat</h1>
      <p class="subtitle">Sign in with Google to continue</p>

      <button id="googleLoginBtn" class="google-btn">
        Continue with Google
      </button>

      <p id="statusMessage" class="status">Not signed in</p>

      <div id="userCard" class="user-card hidden">
        <img id="userPhoto" class="user-photo" alt="User Photo" />
        <h2 id="userName"></h2>
        <p id="userEmail"></p>
      </div>

      <button id="logoutBtn" class="logout-btn hidden">Logout</button>
    </div>
  </div>

  <script type="module" src="index.js"></script>
</body>
</html>
