<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CHATGRAM Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ===============================
GLOBAL
=============================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;

align-items:center;

justify-content:center;

color:white;

overflow:hidden;

}

/* ===============================
BACKGROUND IMAGES
=============================== */

.bg{

position:fixed;

width:100%;
height:100%;

display:flex;

z-index:-2;

}

.bg div{

flex:1;

background-size:cover;

background-position:center;

}

/* left vertical image */

.left{
background-image:url("https://images.unsplash.com/photo-1494790108377-be9c29b29330");
}

/* right vertical image */

.right{
background-image:url("https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e");
}

/* overlay */

.overlay{

position:fixed;

width:100%;
height:100%;

background:rgba(0,0,0,0.65);

z-index:-1;

}

/* ===============================
CONTACT CARD
=============================== */

.card{

width:420px;

background:rgba(255,255,255,0.06);

padding:40px;

border-radius:20px;

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 20px 60px rgba(0,0,0,0.7);

}

/* ===============================
LOGO
=============================== */

.logo{

text-align:center;

font-size:28px;

font-weight:700;

margin-bottom:25px;

}

.logo span{
color:#38bdf8;
}

/* ===============================
TEXT
=============================== */

.subtitle{

text-align:center;

opacity:.85;

margin-bottom:25px;

}

/* ===============================
INPUTS
=============================== */

input,textarea{

width:100%;

padding:14px;

margin-bottom:14px;

border:none;

border-radius:10px;

background:rgba(255,255,255,0.1);

color:white;

}

textarea{
resize:none;
height:110px;
}

/* ===============================
BUTTON
=============================== */

button{

width:100%;

padding:14px;

border:none;

border-radius:10px;

background:linear-gradient(45deg,#3b82f6,#06b6d4);

color:white;

cursor:pointer;

font-size:15px;

transition:.3s;

}

button:hover{
transform:translateY(-3px);
}

/* ===============================
CONTACT INFO
=============================== */

.info{

margin-top:25px;

font-size:14px;

opacity:.8;

text-align:center;

}

/* ===============================
FOOTER
=============================== */

.footer{

margin-top:25px;

text-align:center;

font-size:13px;

opacity:.6;

}

/* ===============================
MOBILE
=============================== */

@media(max-width:700px){

.bg{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="bg">
<div class="left"></div>
<div class="right"></div>
</div>

<div class="overlay"></div>

<div class="card">

<div class="logo">
CHAT<span>GRAM</span>
</div>

<p class="subtitle">

For Sponsorship, Partnerships or Queries

</p>

<form>

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea placeholder="Your Message"></textarea>

<button type="submit">

Send Message

</button>

</form>

<div class="info">

Sponsorship & Business Queries<br>

📧 [harsh01del@gmail.com](mailto:harsh01del@gmail.com)

</div>

<div class="footer">

© 2026 CHATGRAM
Design & Credits by Harsh

</div>

</div>

</body>
</html>
