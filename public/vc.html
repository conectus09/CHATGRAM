<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CHATGRAM Video Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

background:#0f172a;
color:white;

}

.header{

position:absolute;
top:20px;
font-size:28px;
font-weight:600;

}

.header span{
color:#38bdf8;
}

.status{

margin-top:40px;
font-size:14px;
opacity:.8;

}

.video-container{

display:flex;
gap:20px;
margin-top:40px;

}

.video-box{

width:420px;
height:300px;

background:black;
border-radius:12px;
overflow:hidden;

border:2px solid rgba(255,255,255,.1);

}

video{

width:100%;
height:100%;
object-fit:cover;

}

.controls{

margin-top:30px;
display:flex;
gap:15px;

}

button{

padding:12px 20px;
border:none;
border-radius:8px;

font-size:15px;

cursor:pointer;

background:#38bdf8;
color:white;

}

.next{

background:#6366f1;

}

.end{

background:#ef4444;

}

.loader{

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

display:none;

align-items:center;
justify-content:center;

background:#000;

z-index:10;

flex-direction:column;

}

.spinner{

width:50px;
height:50px;

border:5px solid rgba(255,255,255,.2);
border-top:5px solid #38bdf8;

border-radius:50%;

animation:spin 1s linear infinite;

margin-bottom:15px;

}

@keyframes spin{

0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}

}

@media(max-width:900px){

.video-container{
flex-direction:column;
}

.video-box{
width:90vw;
}

}

</style>

</head>

<body>

<div class="loader" id="loader">

<div class="spinner"></div>
<p>Starting camera...</p>

</div>

<div class="header">
CHAT<span>GRAM</span>
</div>

<div class="status" id="status">
Status: Offline
</div>

<div class="video-container">

<div class="video-box">
<video id="localVideo" autoplay muted></video>
</div>

<div class="video-box">
<video id="remoteVideo" autoplay></video>
</div>

</div>

<div class="controls">

<button id="startBtn">Start</button>
<button class="next" id="nextBtn">Next</button>
<button class="end" id="endBtn">End</button>

</div>

<script>

/* SOCKET */

const socket = io(window.location.origin)

/* VARIABLES */

let localStream
let peerConnection

const localVideo = document.getElementById("localVideo")
const remoteVideo = document.getElementById("remoteVideo")

const loader = document.getElementById("loader")
const status = document.getElementById("status")

const startBtn = document.getElementById("startBtn")
const nextBtn = document.getElementById("nextBtn")
const endBtn = document.getElementById("endBtn")

/* ICE SERVERS */

const config = {

iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]

}

/* START CAMERA */

async function startCamera(){

loader.style.display="flex"

try{

localStream = await navigator.mediaDevices.getUserMedia({
video:true,
audio:true
})

localVideo.srcObject = localStream

loader.style.display="none"

}catch(err){

loader.style.display="none"

alert("Camera error: " + err.message)

}

}

/* START MATCH */

startBtn.onclick = async ()=>{

await startCamera()

socket.emit("startChat")

status.innerHTML="Searching stranger..."

}

/* MATCHED */

socket.on("connected", async ()=>{

status.innerHTML="Connected"

peerConnection = new RTCPeerConnection(config)

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream)
})

peerConnection.ontrack = (event)=>{
remoteVideo.srcObject = event.streams[0]
}

peerConnection.onicecandidate = (event)=>{

if(event.candidate){

socket.emit("ice",event.candidate)

}

}

const offer = await peerConnection.createOffer()

await peerConnection.setLocalDescription(offer)

socket.emit("offer",offer)

})

/* OFFER */

socket.on("offer", async (offer)=>{

peerConnection = new RTCPeerConnection(config)

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream)
})

peerConnection.ontrack = (event)=>{
remoteVideo.srcObject = event.streams[0]
}

peerConnection.onicecandidate = (event)=>{

if(event.candidate){

socket.emit("ice",event.candidate)

}

}

await peerConnection.setRemoteDescription(offer)

const answer = await peerConnection.createAnswer()

await peerConnection.setLocalDescription(answer)

socket.emit("answer",answer)

})

/* ANSWER */

socket.on("answer", async (answer)=>{

await peerConnection.setRemoteDescription(answer)

})

/* ICE */

socket.on("ice", async (candidate)=>{

try{

await peerConnection.addIceCandidate(candidate)

}catch{}

})

/* NEXT */

nextBtn.onclick = ()=>{

endCall()

socket.emit("next")

status.innerHTML="Searching stranger..."

}

/* END */

endBtn.onclick = ()=>{

endCall()

socket.disconnect()

status.innerHTML="Disconnected"

}

/* STRANGER LEFT */

socket.on("strangerDisconnected",()=>{

endCall()

status.innerHTML="Stranger left"

})

/* WAITING */

socket.on("waiting",()=>{

status.innerHTML="Waiting for stranger..."

})

/* END CALL */

function endCall(){

if(peerConnection){

peerConnection.close()

peerConnection = null

}

remoteVideo.srcObject = null

}

</script>

</body>
</html>
