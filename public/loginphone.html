<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUMPY Login</title>

<!-- ✅ Firebase SDK (v9 compat mode - CDN) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", sans-serif;
}

body {
    height: 100vh;
    background: url("https://isomer-user-content.by.gov.sg/85/b8be5e01-fb19-4e93-bf94-f4bceac5b5d1/Text_me__Instant_messaging_through_the_years.jpg") no-repeat center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(10,20,40,0.80);
    backdrop-filter: blur(16px);
}

.container {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 480px;
    text-align: center;
    color: white;
}

.logo {
    font-size: 105px;
    font-weight: 900;
    letter-spacing: 6px;
    background: linear-gradient(90deg, #00c6ff, #00ff9d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.title {
    margin-top: 10px;
    font-size: 18px;
    opacity: 0.9;
}

.card {
    margin-top: 28px;
    padding: 32px;
    border-radius: 24px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    box-shadow: 0 25px 70px rgba(0,0,0,0.5);
}

.label {
    text-align: left;
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 8px;
}

.row {
    display: flex;
    gap: 12px;
}

.input-box {
    flex: 1;
    background: rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px;
    transition: 0.25s;
}

.input-box:focus-within {
    background: rgba(0,255,200,0.25);
    transform: scale(1.03);
}

input {
    width: 100%;
    border: none;
    outline: none;
    background: transparent;
    color: white;
    font-size: 17px;
}

input::placeholder {
    color: rgba(255,255,255,0.4);
}

.btn {
    margin-top: 22px;
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    background: linear-gradient(90deg, #00c6ff, #00ff9d);
    transition: 0.3s;
    color: #000;
}

.btn:hover:not(:disabled) {
    transform: scale(1.05);
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
}

.otp-box {
    display: flex;
    justify-content: space-between;
    margin-top: 22px;
}

.otp-box input {
    width: 58px;
    height: 62px;
    border-radius: 12px;
    text-align: center;
    font-size: 24px;
    background: rgba(255,255,255,0.12);
    transition: 0.2s;
}

.otp-box input:focus {
    background: rgba(0,255,200,0.35);
    transform: scale(1.1);
    outline: none;
}

/* Status message */
.status {
    margin-top: 14px;
    font-size: 13px;
    min-height: 20px;
    transition: 0.3s;
}

.status.error   { color: #ff6b6b; }
.status.success { color: #00ff9d; }
.status.info    { color: #00c6ff; }

/* Resend */
.resend {
    margin-top: 16px;
    font-size: 13px;
    opacity: 0.6;
    cursor: pointer;
    transition: 0.2s;
}

.resend:hover { opacity: 1; color: #00ff9d; }

/* reCAPTCHA container */
#recaptcha-container {
    margin-top: 14px;
    display: flex;
    justify-content: center;
}

/* Spinner */
.spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,0.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.hidden { display: none; }
</style>
</head>

<body>

<div class="container">

    <div class="logo">BUMPY</div>
    <div class="title" id="mainTitle">Enter your phone number to login</div>

    <!-- ── PHONE CARD ── -->
    <div class="card" id="phoneCard">

        <div class="label">Phone Number</div>

        <div class="row">
            <div class="input-box" style="max-width:100px;">
                <input type="text" id="countryCode" value="+91" placeholder="+91"
                    oninput="this.value=this.value.replace(/[^+0-9]/g,'')">
            </div>
            <div class="input-box">
                <input type="text" id="phone" placeholder="Enter phone number"
                    inputmode="numeric"
                    maxlength="10"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
        </div>

        <!-- invisible reCAPTCHA mounts here -->
        <div id="recaptcha-container"></div>

        <button class="btn" id="sendBtn" onclick="sendOTP()">Continue</button>
        <div class="status" id="phoneStatus"></div>

    </div>

    <!-- ── OTP CARD ── -->
    <div class="card hidden" id="otpCard">

        <div class="label">Verification Code</div>

        <div class="otp-box" id="otpBox">
            <input maxlength="1" inputmode="numeric" oninput="move(this,0)">
            <input maxlength="1" inputmode="numeric" oninput="move(this,1)">
            <input maxlength="1" inputmode="numeric" oninput="move(this,2)">
            <input maxlength="1" inputmode="numeric" oninput="move(this,3)">
            <input maxlength="1" inputmode="numeric" oninput="move(this,4)">
            <input maxlength="1" inputmode="numeric" oninput="move(this,5)">
        </div>

        <button class="btn" id="verifyBtn" onclick="verifyOTP()">Verify OTP</button>
        <div class="status" id="otpStatus"></div>

        <div class="resend" id="resendBtn" onclick="resendOTP()">
            Didn't receive OTP? <u>Resend</u>
        </div>

    </div>

</div>

<script>
/* ================================================================
   🔥 FIREBASE CONFIG — Replace with your own from Firebase Console
   Firebase Console → Project Settings → Your Apps → Config
   ================================================================ */
const firebaseConfig = {
    apiKey:            "AIzaSyAkyuA8xY3LyBdNn9_l9aniAfJ7fjMS__0",
    authDomain:        "bumpy-c0feb.firebaseapp.com",
    projectId:         "bumpy-c0feb",
    storageBucket:     "bumpy-c0feb.firebasestorage.app",
    messagingSenderId: "1007047112567",
    appId:             "1:1007047112567:web:a14858e9d4c2d6de579372"
};

// ── Init Firebase ──────────────────────────────────────────────
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

// For local testing only — remove in production!
// auth.useEmulator("http://localhost:9099");

// ── State ──────────────────────────────────────────────────────
let confirmationResult = null;
let recaptchaVerifier  = null;

// ── Setup invisible reCAPTCHA ──────────────────────────────────
function setupRecaptcha() {
    if (recaptchaVerifier) return; // already set up

    recaptchaVerifier = new firebase.auth.RecaptchaVerifier("recaptcha-container", {
        size: "invisible",           // 👈 change to "normal" for visible checkbox
        callback: () => {
            // reCAPTCHA solved — sendOTP will proceed
        },
        "expired-callback": () => {
            setStatus("phoneStatus", "reCAPTCHA expired. Please try again.", "error");
            recaptchaVerifier.clear();
            recaptchaVerifier = null;
        }
    });

    recaptchaVerifier.render().catch(err => {
        console.error("reCAPTCHA render error:", err);
    });
}

// ── Send OTP ───────────────────────────────────────────────────
async function sendOTP() {
    const cc    = document.getElementById("countryCode").value.trim() || "+91";
    const phone = document.getElementById("phone").value.trim();

    if (phone.length < 10) {
        setStatus("phoneStatus", "⚠️ Enter a valid 10-digit phone number.", "error");
        return;
    }

    const fullPhone = cc + phone;

    setBtnLoading("sendBtn", true);
    setStatus("phoneStatus", "Sending OTP…", "info");

    try {
        setupRecaptcha();

        confirmationResult = await auth.signInWithPhoneNumber(fullPhone, recaptchaVerifier);

        // Switch to OTP card
        document.getElementById("phoneCard").classList.add("hidden");
        document.getElementById("otpCard").classList.remove("hidden");
        document.getElementById("mainTitle").innerText = "Enter the OTP sent to " + fullPhone;

        setStatus("otpStatus", "✅ OTP sent successfully!", "success");
        document.querySelectorAll(".otp-box input")[0].focus();

    } catch (err) {
        console.error(err);
        setStatus("phoneStatus", friendlyError(err), "error");

        // Reset reCAPTCHA on failure so user can retry
        if (recaptchaVerifier) {
            recaptchaVerifier.clear();
            recaptchaVerifier = null;
        }
    } finally {
        setBtnLoading("sendBtn", false);
    }
}

// ── OTP box navigation ─────────────────────────────────────────
function move(input, index) {
    input.value = input.value.replace(/[^0-9]/g, "");
    const inputs = document.querySelectorAll(".otp-box input");

    if (input.value.length === 1 && index < 5) {
        inputs[index + 1].focus();
    }

    // Auto-verify when all 6 digits filled
    const otp = [...inputs].map(i => i.value).join("");
    if (otp.length === 6) {
        setTimeout(verifyOTP, 200);
    }
}

// Allow backspace navigation
document.addEventListener("keydown", (e) => {
    const inputs = document.querySelectorAll(".otp-box input");
    inputs.forEach((inp, idx) => {
        if (e.target === inp && e.key === "Backspace" && !inp.value && idx > 0) {
            inputs[idx - 1].focus();
        }
    });
});

// ── Verify OTP ─────────────────────────────────────────────────
async function verifyOTP() {
    const inputs = document.querySelectorAll(".otp-box input");
    const otp    = [...inputs].map(i => i.value).join("");

    if (otp.length < 6) {
        setStatus("otpStatus", "⚠️ Please enter all 6 digits.", "error");
        return;
    }

    if (!confirmationResult) {
        setStatus("otpStatus", "Session expired. Please go back and try again.", "error");
        return;
    }

    setBtnLoading("verifyBtn", true);
    setStatus("otpStatus", "Verifying…", "info");

    try {
        const result = await confirmationResult.confirm(otp);
        const user   = result.user;

        setStatus("otpStatus", "✅ Logged in as " + user.phoneNumber, "success");

        // ✅ Success → redirect after short delay
        setTimeout(() => {
            window.location.href = "home.html";
        }, 800);

    } catch (err) {
        console.error(err);
        setStatus("otpStatus", friendlyError(err), "error");
        // Clear OTP boxes on wrong code
        inputs.forEach(i => i.value = "");
        inputs[0].focus();
    } finally {
        setBtnLoading("verifyBtn", false);
    }
}

// ── Resend OTP ─────────────────────────────────────────────────
function resendOTP() {
    // Go back to phone card
    document.getElementById("otpCard").classList.add("hidden");
    document.getElementById("phoneCard").classList.remove("hidden");
    document.getElementById("mainTitle").innerText = "Enter your phone number to login";

    // Clear reCAPTCHA so it re-renders fresh
    if (recaptchaVerifier) {
        recaptchaVerifier.clear();
        recaptchaVerifier = null;
    }

    // Clear OTP inputs
    document.querySelectorAll(".otp-box input").forEach(i => i.value = "");
    setStatus("phoneStatus", "You can re-send the OTP now.", "info");
}

// ── Helpers ────────────────────────────────────────────────────
function setStatus(id, msg, type) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.className   = "status " + type;
}

function setBtnLoading(id, loading) {
    const btn = document.getElementById(id);
    if (loading) {
        btn.disabled   = true;
        btn.innerHTML  = '<span class="spinner"></span> Please wait…';
    } else {
        btn.disabled   = false;
        btn.innerHTML  = id === "sendBtn" ? "Continue" : "Verify OTP";
    }
}

function friendlyError(err) {
    const map = {
        "auth/invalid-phone-number"   : "❌ Invalid phone number format.",
        "auth/too-many-requests"      : "❌ Too many attempts. Try again later.",
        "auth/invalid-verification-code": "❌ Wrong OTP. Please try again.",
        "auth/code-expired"           : "❌ OTP expired. Please resend.",
        "auth/quota-exceeded"         : "❌ SMS quota exceeded. Try later.",
        "auth/captcha-check-failed"   : "❌ reCAPTCHA failed. Refresh and retry.",
    };
    return map[err.code] || ("❌ Error: " + (err.message || err.code));
}
</script>
<script>
(function () {

  // ── 1. RIGHT CLICK BAND ──
  document.addEventListener("contextmenu", function (e) {
    e.preventDefault();
  });

  // ── 2. KEYBOARD SHORTCUTS BAND ──
  document.addEventListener("keydown", function (e) {
    // F12
    if (e.key === "F12") { e.preventDefault(); return false; }

    // Ctrl+Shift+I (Inspect)
    if (e.ctrlKey && e.shiftKey && e.key === "I") { e.preventDefault(); return false; }

    // Ctrl+Shift+J (Console)
    if (e.ctrlKey && e.shiftKey && e.key === "J") { e.preventDefault(); return false; }

    // Ctrl+Shift+C (Elements)
    if (e.ctrlKey && e.shiftKey && e.key === "C") { e.preventDefault(); return false; }

    // Ctrl+U (View Source)
    if (e.ctrlKey && e.key === "u") { e.preventDefault(); return false; }

    // Ctrl+S (Save Page)
    if (e.ctrlKey && e.key === "s") { e.preventDefault(); return false; }

    // Ctrl+A (Select All)
    if (e.ctrlKey && e.key === "a") { e.preventDefault(); return false; }

    // Ctrl+C (Copy)
    if (e.ctrlKey && e.key === "c") { e.preventDefault(); return false; }

    // Ctrl+P (Print)
    if (e.ctrlKey && e.key === "p") { e.preventDefault(); return false; }
  });

  // ── 3. TEXT SELECT BAND ──
  document.addEventListener("selectstart", function (e) {
    e.preventDefault();
  });

  // ── 4. DRAG BAND ──
  document.addEventListener("dragstart", function (e) {
    e.preventDefault();
  });

  // ── 5. DEVTOOLS OPEN DETECT + REDIRECT ──
  var devtoolsOpen = false;

  setInterval(function () {
    var threshold = 160;
    if (
      window.outerWidth - window.innerWidth > threshold ||
      window.outerHeight - window.innerHeight > threshold
    ) {
      if (!devtoolsOpen) {
        devtoolsOpen = true;
        document.body.innerHTML = `
          <div style="
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            height:100vh;
            background:#0a1428;
            color:white;
            font-family:sans-serif;
            text-align:center;
            gap:16px;
          ">
            <div style="font-size:60px;">🚫</div>
            <div style="font-size:28px;font-weight:800;color:#ff4444;">Access Denied</div>
            <div style="font-size:16px;color:#90a4ae;">Developer Tools detected.<br>This activity is not allowed.</div>
          </div>
        `;
      }
    } else {
      devtoolsOpen = false;
    }
  }, 1000);

  // ── 6. CONSOLE WARN ──
  console.log = function () {};
  console.warn = function () {};
  console.error = function () {};
  console.info = function () {};
  console.clear();

  // ── 7. DEBUGGER LOOP (console open hone pe slow karta hai) ──
  setInterval(function () {
    (function () {
      var d = new Date();
      debugger;
      if (new Date() - d > 100) {
        document.body.innerHTML = `
          <div style="
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            height:100vh;
            background:#0a1428;
            color:white;
            font-family:sans-serif;
            text-align:center;
            gap:16px;
          ">
            <div style="font-size:60px;">🚫</div>
            <div style="font-size:28px;font-weight:800;color:#ff4444;">Access Denied</div>
            <div style="font-size:16px;color:#90a4ae;">Debugging detected.<br>This activity is not allowed.</div>
          </div>
        `;
      }
    })();
  }, 3000);

})();
</script>

</body>
</html>
